name: Build native libraries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release"
        required: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            output: libvaultblob.so
            asset_suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            output: libvaultblob.so
            asset_suffix: linux-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            output: libvaultblob.dylib
            asset_suffix: darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            output: libvaultblob.dylib
            asset_suffix: darwin-arm64
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            output: vaultblob.dll
            asset_suffix: windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install zigbuild
        run: cargo install cargo-zigbuild

      - name: Build with zigbuild
        run: >
          cargo zigbuild
          --manifest-path native/Cargo.toml
          --target ${{ matrix.target }}
          --release

      - name: Upload binary as release asset
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset_name="${{ matrix.output }}-${{ matrix.asset_suffix }}"
          cp "native/target/${{ matrix.target }}/release/${{ matrix.output }}" "/tmp/$asset_name"
          gh release upload "${{ github.ref_name }}" "/tmp/$asset_name" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: vaultblob-${{ matrix.asset_suffix }}
          path: native/target/${{ matrix.target }}/release/${{ matrix.output }}
          if-no-files-found: error
